<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bokeh Gallery Uploader</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel upload-panel">
        <div class="eyebrow">Bokeh Coyote</div>
        <h1>Gallery Uploader</h1>
        <p class="lede">Upload optimized artwork masters to Cloudinary and commit metadata to the GitHub Pages gallery.</p>

        <button class="secondary" id="settingsToggle" type="button">Settings</button>

        <form id="artworkForm" class="form-grid">
          <label class="field span-2">
            <span>Image</span>
            <button class="file-picker" id="chooseImage" type="button">
              <strong>Choose image</strong>
              <small id="fileSummary">No file selected</small>
            </button>
          </label>

          <label class="field"><span>Title</span><input id="title" name="title" autocomplete="off" required></label>
          <label class="field"><span>Custom ID</span><input id="id" name="id" autocomplete="off" placeholder="auto-generated if blank"></label>

          <label class="field">
            <span>Gallery</span>
            <select id="gallery" name="gallery"><option>Main</option><option>Experimental</option><option>NSFW</option></select>
          </label>

          <label class="field"><span>Category</span><input id="category" name="category" value="artwork" autocomplete="off"></label>
          <label class="field"><span>Status</span><select id="status" name="status"><option value="available">available</option><option value="sold">sold</option><option value="private">private</option><option value="restricted">restricted</option></select></label>
          <label class="field"><span>Year</span><input id="year" name="year" value="2026" autocomplete="off"></label>
          <label class="field"><span>Medium</span><input id="medium" name="medium" value="Digital artwork" autocomplete="off"></label>
          <label class="field"><span>Dimensions</span><input id="dimensions" name="dimensions" placeholder="auto from upload if blank" autocomplete="off"></label>
          <label class="field span-2"><span>Alt Text</span><textarea id="alt" name="alt" rows="3" placeholder="Describe the artwork for screen readers"></textarea></label>
          <label class="check-field"><input id="featured" name="featured" type="checkbox"><span>Feature first in its gallery</span></label>
          <label class="field"><span>Cloudinary public ID slug</span><input id="publicId" name="publicId" placeholder="auto from title if blank" autocomplete="off"></label>

          <button class="primary span-2" id="submitButton" type="submit">Upload and Commit</button>
        </form>
      </section>

      <aside class="panel status-panel">
        <h2>Status</h2>
        <div id="statusLog" class="status-log" aria-live="polite"><p>Open Settings first and add your local credentials.</p></div>
        <section class="result" id="result" hidden>
          <h3>Last Upload</h3>
          <dl><dt>Public ID</dt><dd id="resultPublicId"></dd><dt>GitHub Commit</dt><dd><a id="resultCommit" href="#" target="_blank" rel="noreferrer"></a></dd></dl>
        </section>
      </aside>
    </main>

    <dialog id="settingsDialog">
      <form id="settingsForm" method="dialog">
        <div class="dialog-head"><div><div class="eyebrow">Local only</div><h2>Settings</h2></div><button class="icon" id="closeSettings" type="button" aria-label="Close settings">x</button></div>
        <div class="settings-grid">
          <fieldset>
            <legend>Cloudinary</legend>
            <label class="field"><span>Cloud name</span><input id="cloudName" name="cloudName" required></label>
            <label class="field"><span>API key</span><input id="apiKey" name="apiKey" autocomplete="off" required></label>
            <label class="field"><span>API secret</span><input id="apiSecret" name="apiSecret" type="password" autocomplete="off" required></label>
          </fieldset>
          <fieldset>
            <legend>GitHub</legend>
            <label class="field"><span>Owner</span><input id="owner" name="owner" required></label>
            <label class="field"><span>Repo</span><input id="repo" name="repo" required></label>
            <label class="field"><span>Branch</span><input id="branch" name="branch" required></label>
            <label class="field"><span>Gallery path</span><input id="galleryPath" name="galleryPath" required></label>
            <label class="field"><span>GitHub token</span><input id="token" name="token" type="password" autocomplete="off" required></label>
          </fieldset>
          <fieldset class="span-2">
            <legend>Cloudinary folders</legend>
            <div class="folder-grid"><label class="field"><span>Main</span><input id="folderMain" name="folderMain"></label><label class="field"><span>Experimental</span><input id="folderExperimental" name="folderExperimental"></label><label class="field"><span>NSFW</span><input id="folderNsfw" name="folderNsfw"></label></div>
          </fieldset>
        </div>
        <footer class="dialog-actions"><button class="secondary" id="cancelSettings" type="button">Cancel</button><button class="primary" type="submit">Save Settings</button></footer>
      </form>
    </dialog>

    <script src="./renderer.js"></script>
  </body>
</html>
